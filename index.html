<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noise Playground</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div
        class="graph-panel"
        id="graph-column"
        aria-label="Noise graph editor"
      >
        <div class="graph-panel__chrome">
          <div class="graph-panel__head">
            <h1>Noise Playground</h1>
            <p class="sub">
              Node graph: OpenSimplex, fractal, Worley &mdash; live height preview
            </p>
          </div>
          <button
            type="button"
            class="graph-panel__min-btn"
            id="graph-panel-minimize"
            title="Minimize graph panel"
            aria-expanded="true"
            aria-controls="graph-column"
          >
            Minimize
          </button>
        </div>
        <div id="graph-root" class="graph-panel__body"></div>
      </div>
      <button
        type="button"
        class="graph-panel__restore"
        id="graph-panel-restore"
        title="Show graph panel"
        hidden
        aria-hidden="true"
      >
        Graph
      </button>
      <div
        class="splitter splitter--vertical"
        id="split-graph-view"
        role="separator"
        aria-orientation="vertical"
        aria-label="Drag to resize graph and preview columns"
        title="Drag to resize graph and preview"
        tabindex="0"
      ></div>
      <div class="viewport-wrap viewport-fullscreen" id="viewport-wrap">
        <div
          class="viewport-stats"
          id="viewport-stats"
          aria-live="polite"
        >
          <span id="viewport-stats-fps">— fps</span>
          <span id="viewport-stats-pos">pos —</span>
        </div>
        <button
          type="button"
          class="render-panel__tab"
          id="render-panel-restore"
          title="Open render options"
          hidden
          aria-hidden="true"
        >
          Render
        </button>
        <canvas
          id="view"
          tabindex="0"
          aria-label="Noise preview. Click to focus. Chunk: WASD / arrows adjust offset, wheel zoom. World: WASD move, mouselook, shift sprint, wheel dolly."
        ></canvas>
        <aside
          class="render-panel"
          id="render-panel"
          aria-label="Render and preview options"
        >
          <div class="render-panel__head-row">
            <h2 class="render-panel__title">Render</h2>
            <div class="render-panel__head-actions">
              <button
                type="button"
                class="render-panel__icon-btn"
                id="render-panel-minimize"
                title="Minimize options"
                aria-expanded="true"
                aria-controls="render-panel"
              >
                Minimize
              </button>
              <button
                type="button"
                class="render-panel__icon-btn"
                id="render-panel-close"
                title="Close panel (use tab to reopen)"
                aria-label="Close render options"
              >
                ×
              </button>
            </div>
          </div>
          <label class="render-panel__row">
            <span class="render-panel__label">Backend</span>
            <select id="render-backend" class="control-select" aria-label="Terrain renderer backend">
              <option value="auto">Auto</option>
              <option value="webgpu">WebGPU</option>
              <option value="cpu">CPU fallback</option>
            </select>
          </label>
          <label class="render-panel__row">
            <span class="render-panel__label">View</span>
            <select
              id="render-view-mode"
              class="control-select"
              aria-label="View mode: chunk snapshot or world streaming"
            >
              <option value="chunk">Chunk</option>
              <option value="world">World</option>
            </select>
          </label>
          <div class="render-panel__row">
            <button type="button" id="render-reset" class="control-button">
              Reset view &amp; terrain
            </button>
          </div>
          <p class="render-panel__hint" data-render-for="world" id="render-mode-hint" hidden>
            Click canvas to look. Escape stops pointer lock.
          </p>
          <label class="render-panel__row" data-render-for="chunk">
            <span class="render-panel__label">Chunk view</span>
            <select id="render-chunk-view" class="control-select" aria-label="Chunk grid size: 1x1, 3x3, or 5x5">
              <option value="1">1×1</option>
              <option value="3">3×3</option>
              <option value="5">5×5</option>
            </select>
          </label>
          <label class="render-panel__row" data-render-for="chunk">
            <span class="render-panel__label">Zoom</span>
            <div class="render-panel__dual">
              <input
                id="render-zoom"
                class="control-range"
                type="range"
                min="0.25"
                max="4"
                step="0.01"
                value="1"
              />
              <input
                id="render-zoom-num"
                class="control-number"
                type="number"
                min="0.25"
                max="4"
                step="0.01"
                value="1"
              />
            </div>
          </label>
          <label class="render-panel__row" data-render-for="chunk">
            <span class="render-panel__label">Offset X</span>
            <div class="render-panel__dual">
              <input
                id="render-offset-x"
                class="control-range"
                type="range"
                min="-500"
                max="500"
                step="0.5"
                value="0"
              />
              <input
                id="render-offset-x-num"
                class="control-number"
                type="number"
                min="-1000000"
                max="1000000"
                step="0.1"
                value="0"
              />
            </div>
          </label>
          <label class="render-panel__row" data-render-for="chunk">
            <span class="render-panel__label">Offset Y</span>
            <div class="render-panel__dual">
              <input
                id="render-offset-y"
                class="control-range"
                type="range"
                min="-500"
                max="500"
                step="0.5"
                value="0"
              />
              <input
                id="render-offset-y-num"
                class="control-number"
                type="number"
                min="-1000000"
                max="1000000"
                step="0.1"
                value="0"
              />
            </div>
          </label>
          <h3 class="render-panel__subtitle">Chunked terrain</h3>
          <label class="render-panel__row" data-render-for="world" hidden>
            <span class="render-panel__label">Chunk radius</span>
            <div class="render-panel__dual">
              <input
                id="render-chunk-r"
                class="control-range"
                type="range"
                min="0"
                max="12"
                step="1"
                value="2"
              />
              <input
                id="render-chunk-r-num"
                class="control-number"
                type="number"
                min="0"
                max="12"
                step="1"
                value="2"
              />
            </div>
          </label>
          <label class="render-panel__row">
            <span class="render-panel__label">Chunk res</span>
            <div class="render-panel__dual">
              <input
                id="render-mesh"
                class="control-range"
                type="range"
                min="8"
                max="512"
                step="1"
                value="192"
              />
              <input
                id="render-mesh-num"
                class="control-number"
                type="number"
                min="8"
                max="512"
                step="1"
                value="192"
              />
            </div>
          </label>
          <label class="render-panel__row">
            <span class="render-panel__label">Chunk size</span>
            <div class="render-panel__dual">
              <input
                id="render-chunk-w"
                class="control-range"
                type="range"
                min="0.05"
                max="4"
                step="0.05"
                value="0.4"
              />
              <input
                id="render-chunk-w-num"
                class="control-number"
                type="number"
                min="0.05"
                max="4"
                step="0.05"
                value="0.4"
              />
            </div>
          </label>
          <label class="render-panel__row" data-render-for="world" hidden>
            <span class="render-panel__label">LOD</span>
            <input
              type="checkbox"
              id="render-lod"
              class="control-checkbox"
              checked
            />
            <span class="render-panel__label-sub">on</span>
          </label>
          <label
            class="render-panel__row"
            data-render-for="world"
            hidden
            title="Distance bands from view center to chunk radius; more layers = finer steps; outer bands are wider (progressive)"
          >
            <span class="render-panel__label">LOD layers</span>
            <div class="render-panel__dual">
              <input
                id="render-lod-layers"
                class="control-range"
                type="range"
                min="1"
                max="12"
                step="1"
                value="3"
              />
              <input
                id="render-lod-layers-num"
                class="control-number"
                type="number"
                min="1"
                max="12"
                step="1"
                value="3"
                aria-label="Number of LOD distance bands"
              />
            </div>
          </label>
          <label class="render-panel__row" data-render-for="world" hidden>
            <span class="render-panel__label">Min LOD res</span>
            <div class="render-panel__dual">
              <input
                id="render-lodmin"
                class="control-range"
                type="range"
                min="2"
                max="128"
                step="1"
                value="8"
              />
              <input
                id="render-lodmin-num"
                class="control-number"
                type="number"
                min="2"
                max="128"
                step="1"
                value="8"
              />
            </div>
          </label>
          <label class="render-panel__row">
            <span class="render-panel__label">Rebuilds / frame</span>
            <div class="render-panel__dual">
              <input
                id="render-rebuild"
                class="control-range"
                type="range"
                min="1"
                max="32"
                step="1"
                value="3"
              />
              <input
                id="render-rebuild-num"
                class="control-number"
                type="number"
                min="1"
                max="32"
                step="1"
                value="3"
              />
            </div>
          </label>
          <h3 class="render-panel__subtitle">Debug</h3>
          <label class="render-panel__row render-panel__row--inline">
            <input type="checkbox" id="debug-borders" />
            <span>Chunk edges</span>
          </label>
          <label class="render-panel__row render-panel__row--inline">
            <input type="checkbox" id="debug-dirty" />
            <span>Dirty chunks</span>
          </label>
          <label class="render-panel__row render-panel__row--inline" data-render-for="world" hidden>
            <input type="checkbox" id="debug-lod" />
            <span>Color LOD</span>
          </label>
          <label class="render-panel__row render-panel__row--inline">
            <input type="checkbox" id="debug-shader-preview" />
            <span>Shader preview</span>
          </label>
          <span class="render-panel__hint" id="render-mesh-verts" aria-live="polite"
            >—</span
          >
          <label class="render-panel__row">
            <span class="render-panel__label">Look</span>
            <select id="render-preset" class="control-select" aria-label="Texture and lighting preset">
              <option value="natural">Natural</option>
              <option value="desert">Desert</option>
              <option value="snow">Snow</option>
              <option value="volcanic">Volcanic</option>
            </select>
          </label>
        </aside>
      </div>
      <div
        class="splitter splitter--horizontal"
        id="split-diag"
        role="separator"
        aria-orientation="horizontal"
        aria-label="Drag to resize the status bar height"
        title="Drag to resize status area"
        tabindex="0"
      ></div>
      <div id="diagnostics" class="diagnostics" role="status">
        <div class="diagnostics__content" id="diagnostics-content"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
